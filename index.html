<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Archive</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Hubballi&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main class="homepage">

        <!-- ===============================
             COVER
        ================================ -->

        <section class="cover">

            <h1 class="logo">
                The Archive
            </h1>

            <div class="date-area">

                <p id="weekday" class="weekday">
                    Sunday
                </p>

                <p id="date" class="date">
                    July 5, 2026
                </p>

            </div>

            <blockquote class="quote">

                “The days are long,
                <br>
                but the years are short.”

            </blockquote>

            <button
                id="continueButton"
                class="continue-button">

                Continue

            </button>

        </section>



        <!-- ===============================
             TABLE OF CONTENTS
        ================================ -->

        <section class="contents">

            <div class="contents-header">

                <h2>
                    2026
                </h2>

                <p>
                    Contents
                </p>

            </div>

            <div
                id="chapterContainer"
                class="chapter-container">

                <!-- JavaScript inserts months here -->

            </div>

        </section>

    </main>


    <!-- ===============================
         PAGE TRANSITION
    ================================ -->

    <div
        id="pageFade"
        class="page-fade">

    </div>


    <!-- ===============================
         MAIN SCRIPT
    ================================ -->

    <script src="script.js"></script>

</body>

</html>
